<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delhi - Dehradun Expressway</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <header class="hero">
       
        <div class="hero-content">
            <h1> 🚅 Delhi - Dehradun Expressway</h1>
            <p>Smart Route Finder</p>
        </div>
    </header>

    <main class="content">

        <div class="container">

            <h2 class="card-title">🔍 Find Your Route</h2>

            <div class="input-group">
                <label for="source">📍 Source City</label>
                <select id="source">
                    <option value="">Select Source</option>
                </select>
            </div>

            <button class="swap-btn" onclick="swapStations()">
                🔄 Swap Route
            </button>

            <div class="input-group">
                <label for="destination">🏁 Destination City</label>
                <select id="destination">
                    <option value="">Select Destination</option>
                </select>
            </div>

            <button class="track-btn" onclick="findRoute()">
                Track Train 🚆
            </button>

            <div id="output"></div>

            <div class="footer-note">Fares &amp; timings are estimated for demo purposes only.</div>

        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
